acing" textLength="97.2959" x="312.73" y="531.0234">Administrador</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="24" id="ent0016"><path d="M422.35,53.2683 L422.35,77.2383 L387.54,81.2383 L422.35,85.2383 L422.35,109.1999 A0,0 0 0 0 422.35,109.1999 L694.4125,109.1999 A0,0 0 0 0 694.4125,109.1999 L694.4125,63.2683 L684.4125,53.2683 L422.35,53.2683 A0,0 0 0 0 422.35,53.2683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M684.4125,53.2683 L684.4125,63.2683 L694.4125,63.2683 L684.4125,53.2683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.0571" x="428.35" y="70.8366">Usuario:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.0625" x="428.35" y="86.1472">Origen com&#250;n de actores autenticables.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="219.2798" x="428.35" y="101.4577">Inicia y cierra sesi&#243;n en el sistema.</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="30" id="ent0019"><path d="M94.15,197.4083 L94.15,213.7183 L58.96,217.7183 L94.15,221.7183 L94.15,238.0294 A0,0 0 0 0 94.15,238.0294 L298.61,238.0294 A0,0 0 0 0 298.61,238.0294 L298.61,207.4083 L288.61,197.4083 L94.15,197.4083 A0,0 0 0 0 94.15,197.4083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M288.61,197.4083 L288.61,207.4083 L298.61,207.4083 L288.61,197.4083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="53.0981" x="100.15" y="214.9766">Alumno:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.46" x="100.15" y="230.2872">Puede solicitar una dispensa.</text></g><g class="entity" data-qualified-name="GMN21" data-source-line="35" id="ent0022"><path d="M424.59,189.7583 L424.59,213.7183 L389.99,217.7183 L424.59,221.7183 L424.59,245.6899 A0,0 0 0 0 424.59,245.6899 L742.1715,245.6899 A0,0 0 0 0 742.1715,245.6899 L742.1715,199.7583 L732.1715,189.7583 L424.59,189.7583 A0,0 0 0 0 424.59,189.7583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M732.1715,189.7583 L732.1715,199.7583 L742.1715,199.7583 L732.1715,189.7583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="56.5576" x="430.59" y="207.3266">Profesor:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.5815" x="430.59" y="222.6372">Puede consultar listas de alumnos y dispensas,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.8745" x="430.59" y="237.9477">y registrar la asistencia.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="41" id="ent0025"><path d="M453.24,318.5883 L453.24,350.2083 L418.53,354.2083 L453.24,358.2083 L453.24,389.8305 A0,0 0 0 0 453.24,389.8305 L741.5144,389.8305 A0,0 0 0 0 741.5144,389.8305 L741.5144,328.5883 L731.5144,318.5883 L453.24,318.5883 A0,0 0 0 0 453.24,318.5883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M731.5144,318.5883 L731.5144,328.5883 L741.5144,328.5883 L731.5144,318.5883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.708" x="459.24" y="336.1566">Director de Grado:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.2744" x="459.24" y="351.4672">Puede hacer todo lo que hace un Profesor,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.3677" x="459.24" y="366.7777">adem&#225;s de revisar y aprobar o rechazar</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="88.2832" x="459.24" y="382.0883">las dispensas.</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="48" id="ent0028"><path d="M951.78,182.0983 L951.78,213.7183 L917.33,217.7183 L951.78,221.7183 L951.78,253.3405 A0,0 0 0 0 951.78,253.3405 L1226.9719,253.3405 A0,0 0 0 0 1226.9719,253.3405 L1226.9719,192.0983 L1216.9719,182.0983 L951.78,182.0983 A0,0 0 0 0 951.78,182.0983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1216.9719,182.0983 L1216.9719,192.0983 L1226.9719,192.0983 L1216.9719,182.0983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137.9536" x="957.78" y="199.6666">Secretar&#237;a Acad&#233;mica:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1919" x="957.78" y="214.9772">Gestiona matr&#237;culas y listas de alumnos,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.75" x="957.78" y="230.2877">y registra/tramita las solicitudes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.4736" x="957.78" y="245.5983">de dispensa de los alumnos.</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="55" id="ent0031"><path d="M445.05,452.4583 L445.05,491.7283 L410.14,495.7283 L445.05,499.7283 L445.05,539.011 A0,0 0 0 0 445.05,539.011 L715.7097,539.011 A0,0 0 0 0 715.7097,539.011 L715.7097,462.4583 L705.7097,452.4583 L445.05,452.4583 A0,0 0 0 0 445.05,452.4583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M705.7097,452.4583 L705.7097,462.4583 L715.7097,462.4583 L705.7097,452.4583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.3013" x="451.05" y="470.0266">Administrador del sistema:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.4224" x="451.05" y="485.3372">Puede hacer todo lo que hacen</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.6597" x="451.05" y="500.6477">Alumno, Profesor, Director y Secretar&#237;a,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.8281" x="451.05" y="515.9583">adem&#225;s de crear y gestionar usuarios</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.3311" x="451.05" y="531.2688">y la configuraci&#243;n general del sistema.</text></g><!--reverse link Usuario to Alumno--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="extension" data-source-line="13" id="lnk8"><path d="M317.6813,91.6152 C265.8313,103.1752 164.84,129.3383 76.38,179.4783 C70.46,182.8383 64.58,187.0383 59.13,191.3983" fill="none" id="Usuario-backto-Alumno" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="335.25,87.6983,316.3757,85.759,318.987,97.4714,335.25,87.6983" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Usuario to Profesor--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="extension" data-source-line="14" id="lnk9"><path d="M361.38,137.6983 C361.38,156.1983 361.38,160.4583 361.38,178.9983" fill="none" id="Usuario-backto-Profesor" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="361.38,119.6983,355.38,137.6983,367.38,137.6983,361.38,119.6983" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Usuario to Secretaria--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="extension" data-source-line="15" id="lnk10"><path d="M401.6537,119.8971 C406.8937,124.0371 398.48,116.6983 404.38,119.4783 C549.11,187.7283 605