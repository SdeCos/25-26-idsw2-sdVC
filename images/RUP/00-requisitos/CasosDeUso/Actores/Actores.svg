Administrador</text></g><g class="entity" data-qualified-name="GMN14" data-source-line="24" id="ent0015"><path d="M422.35,53.2583 L422.35,77.2283 L387.54,81.2283 L422.35,85.2283 L422.35,109.1899 A0,0 0 0 0 422.35,109.1899 L694.4125,109.1899 A0,0 0 0 0 694.4125,109.1899 L694.4125,63.2583 L684.4125,53.2583 L422.35,53.2583 A0,0 0 0 0 422.35,53.2583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M684.4125,53.2583 L684.4125,63.2583 L694.4125,63.2583 L684.4125,53.2583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.0571" x="428.35" y="70.8266">Usuario:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.0625" x="428.35" y="86.1372">Origen com&#250;n de actores autenticables.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="219.2798" x="428.35" y="101.4477">Inicia y cierra sesi&#243;n en el sistema.</text></g><g class="entity" data-qualified-name="GMN17" data-source-line="30" id="ent0018"><path d="M94.15,217.7483 L94.15,234.0583 L58.96,238.0583 L94.15,242.0583 L94.15,258.3694 A0,0 0 0 0 94.15,258.3694 L298.61,258.3694 A0,0 0 0 0 298.61,258.3694 L298.61,227.7483 L288.61,217.7483 L94.15,217.7483 A0,0 0 0 0 94.15,217.7483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M288.61,217.7483 L288.61,227.7483 L298.61,227.7483 L288.61,217.7483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="53.0981" x="100.15" y="235.3166">Alumno:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.46" x="100.15" y="250.6272">Puede solicitar una dispensa.</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="35" id="ent0021"><path d="M424.59,210.0883 L424.59,234.0583 L389.99,238.0583 L424.59,242.0583 L424.59,266.0199 A0,0 0 0 0 424.59,266.0199 L742.1715,266.0199 A0,0 0 0 0 742.1715,266.0199 L742.1715,220.0883 L732.1715,210.0883 L424.59,210.0883 A0,0 0 0 0 424.59,210.0883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M732.1715,210.0883 L732.1715,220.0883 L742.1715,220.0883 L732.1715,210.0883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="56.5576" x="430.59" y="227.6566">Profesor:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.5815" x="430.59" y="242.9672">Puede consultar listas de alumnos y dispensas,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.8745" x="430.59" y="258.2777">y registrar la asistencia.</text></g><g class="entity" data-qualified-name="GMN23" data-source-line="41" id="ent0024"><path d="M453.24,359.2683 L453.24,390.8883 L418.53,394.8883 L453.24,398.8883 L453.24,430.5105 A0,0 0 0 0 453.24,430.5105 L741.5144,430.5105 A0,0 0 0 0 741.5144,430.5105 L741.5144,369.2683 L731.5144,359.2683 L453.24,359.2683 A0,0 0 0 0 453.24,359.2683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M731.5144,359.2683 L731.5144,369.2683 L741.5144,369.2683 L731.5144,359.2683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.708" x="459.24" y="376.8366">Director de Grado:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.2744" x="459.24" y="392.1472">Puede hacer todo lo que hace un Profesor,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.3677" x="459.24" y="407.4577">adem&#225;s de revisar y aprobar o rechazar</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="88.2832" x="459.24" y="422.7683">las dispensas.</text></g><g class="entity" data-qualified-name="GMN26" data-source-line="48" id="ent0027"><path d="M951.84,179.4683 L951.84,234.0583 L917.69,238.0583 L951.84,242.0583 L951.84,296.6421 A0,0 0 0 0 951.84,296.6421 L1222.9186,296.6421 A0,0 0 0 0 1222.9186,296.6421 L1222.9186,189.4683 L1212.9186,179.4683 L951.84,179.4683 A0,0 0 0 0 951.84,179.4683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1212.9186,179.4683 L1212.9186,189.4683 L1222.9186,189.4683 L1212.9186,179.4683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137.9536" x="957.84" y="197.0366">Secretar&#237;a Acad&#233;mica:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.0786" x="957.84" y="212.3472">Gestiona matr&#237;culas y listas de alumnos</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.1826" x="957.84" y="227.6577">(alta individual e importaci&#243;n masiva),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="241.979" x="957.84" y="242.9683">los cat&#225;logos de grados y asignaturas,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.8548" x="957.84" y="258.2788">las asignaciones profesor&#8596;asignatura,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.75" x="957.84" y="273.5894">y registra/tramita las solicitudes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.4736" x="957.84" y="288.8999">de dispensa de los alumnos.</text></g><g class="entity" data-qualified-name="GMN29" data-source-line="58" id="ent0030"><path d="M445.26,493.1383 L445.26,555.3783 L410.16,559.3783 L445.26,563.3783 L445.26,625.6227 A0,0 0 0 0 445.26,625.6227 L727.4978,625.6227 A0,0 0 0 0 727.4978,625.6227 L727.4978,503.1383 L717.4978,493.1383 L445.26,493.1383 A0,0 0 0 0 445.26,493.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M717.4978,493.1383 L717.4978,503.1383 L727.4978,503.1383 L717.4978,493.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.3013" x="451.26" y="510.7066">Administrador del sistema:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.4224" x="451.26" y="526.0172">Puede hacer todo lo que hacen</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.6597" x="451.26" y="541.3277">Alumno, Profesor, Director y Secretar&#237;a,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.5796" x="451.26" y="556.6383">adem&#225;s de crear y gestionar las cuentas</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225.0879" x="451.26" y="571.9488">de personal (profesores, directores,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.8091" x="451.26" y="587.2594">secretar&#237;as y administradores). El alta</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.2378" x="451.26" y="602.5699">individual de alumnos es responsabilidad</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="85.4141" x="451.26" y="617.8805">de Secretar&#237;a.</text></g><!--reverse link Usuario to Alumno--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="extension" data-source-line="13" id="lnk7"><path d="M317.6884,88.7469 C264.6584,97.2769 159.56,119.6383 